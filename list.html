<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/styles.css">
  <title>Guide - 清單</title>
</head>
<body>
  <header>
    <button onclick="returnToIndexEmpty()">回主頁</button>
    <div>清單</div>
    <span></span>
    <div id="userDisplayArea">
      <span id="userDisplay"></span>
      <button id="logoutBtn">登出</button>
    </div>
  </header>
  <script>
    function returnToIndexEmpty() {
      localStorage.removeItem('guideData');
      sessionStorage.removeItem('currentBookEntryId');
      sessionStorage.removeItem('currentMetaId');
      window.location.href = 'index.html';
    }
  </script>

  <div id="filterBar" class="filterBar">
    <label>建立時間：</label>
    <input type="date" id="filterFrom" />
    <span>~</span>
    <input type="date" id="filterTo" />

    <label>狀態：</label>
    <select id="filterStatus">
      <option value="">全部</option>
      <option value="editing">編輯中</option>
      <option value="reviewing">審核中</option>
      <option value="closing">待結案</option>
      <option value="closed">已結案</option>
    </select>

    <label>機關：</label>
    <input type="text" id="filterOrg" placeholder="機關名稱" />

    <label>地區：</label>
    <input type="text" id="filterLoc" placeholder="地區" />

    <label>建立者：</label>
    <input type="text" id="filterCreator" placeholder="建立者" />

    <button id="applyFiltersBtn">套用</button>
    <button id="clearFiltersBtn">清除</button>
  </div>

  <div id="listContainer">載入中…</div>

  <script src="js/env.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/list.js"></script>
</body>
</html>
